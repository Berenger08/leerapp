<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dagelijkse Leerapp</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Dagelijkse Leerapp</h1>
    <div id="streak"></div>
    <div id="stats"></div>
  </header>

  <main>
    <section id="hoofdwoorden">
      <h2>Vandaag</h2>
      <div id="hoofdwoorden-lijst"></div>
      <button id="nog-een-woord-btn">+ Nog een woord</button>
    </section>

    <section id="herhalingen">
      <h2>Herhalingen</h2>
      <div id="herhalingen-lijst"></div>
    </section>

    <button id="beheer-toggle-btn">Alle woorden beheren</button>

    <section id="beheer" class="hidden">
      <h2>Alle woorden</h2>

      <div class="add-woord-form">
        <input id="nieuw-woord" type="text" placeholder="Woord">
        <input id="nieuw-betekenis" type="text" placeholder="Betekenis">
        <input id="nieuw-voorbeeld" type="text" placeholder="Voorbeeldzin (optioneel)">
        <input id="nieuw-categorie" type="text" placeholder="Categorie (optioneel, standaard NL woord)">
        <button id="woord-toevoegen-btn">+ Woord toevoegen</button>
      </div>

      <div id="woorden-lijst"></div>
    </section>
  </main>

  <div id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
