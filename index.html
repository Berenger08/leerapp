<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#333333">
  <title>Dagelijkse Leerapp</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header>
    <h1 id="app-titel">Dagelijkse Leerapp</h1>
    <div id="streak"></div>
    <div id="stats"></div>
  </header>

  <section id="home">
    <h2>Kies een categorie</h2>
    <div id="categorie-lijst"></div>
  </section>

  <main id="app-view" class="hidden">
    <button id="terug-btn">← Terug naar categorieën</button>

    <section id="hoofdwoorden">
      <h2>Vandaag</h2>
      <div id="hoofdwoorden-lijst"></div>
      <button id="nog-een-woord-btn">+ Nog een woord</button>
    </section>

    <section id="herhalingen">
      <h2>Herhalingen</h2>
      <div id="herhalingen-lijst"></div>
    </section>

    <button id="beheer-toggle-btn">Alle woorden beheren</button>

    <section id="beheer" class="hidden">
      <h2>Alle woorden</h2>

      <div class="add-woord-form">
        <input id="nieuw-woord" type="text" placeholder="Woord">
        <input id="nieuw-betekenis" type="text" placeholder="Betekenis">
        <input id="nieuw-voorbeeld" type="text" placeholder="Voorbeeldzin (optioneel)">
        <button id="woord-toevoegen-btn">+ Woord toevoegen</button>
      </div>

      <div id="woorden-lijst"></div>

      <div class="backup-knoppen">
        <button id="export-btn">Exporteer back-up</button>
        <button id="import-btn">Importeer back-up</button>
        <input id="import-input" type="file" accept="application/json" class="hidden">
      </div>
    </section>
  </main>

  <div id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
